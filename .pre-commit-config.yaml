repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-added-large-files
        args: ['--maxkb=102400']
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-merge-conflict
    -   id: check-case-conflict
    -   id: mixed-line-ending
        args: ['--fix=lf']
    -   id: check-yaml
    -   id: check-toml
        exclude: /META-INF/mods\.toml$
    -   id: check-json

-   repo: local
    hooks:
    -   id: minecraft-mod-gradle-check
        name: minecraft mod Gradle checks
        entry: ./gradlew --no-daemon spotlessCheck compileJava compileTestJava
        language: system
        pass_filenames: false
        files: \.(java|json|gradle|kts|properties)$
